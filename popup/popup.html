<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VibeCheck Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>VibeCheck</h1>
        <p class="subtitle">filter ur feed vibes</p>
        
        <div class="setting">
            <label>
                <input type="checkbox" id="enabled" checked>
                <span>Enable VibeCheck</span>
            </label>
        </div>
        
        <div class="setting">
            <label>Sensitivity Threshold</label>
            <input type="range" id="threshold" min="-5" max="0" step="0.1" value="-2.0">
            <span id="threshold-val">-2.0</span>
        </div>
        
        <div class="setting">
            <label>
                <input type="checkbox" id="block_anger" checked>
                <span>Block Anger</span>
            </label>
        </div>
        
        <div class="setting">
            <label>
                <input type="checkbox" id="block_sadness">
                <span>Block Sadness</span>
            </label>
        </div>
        
        <div class="setting">
            <label>
                <input type="checkbox" id="block_toxic" checked>
                <span>Block Toxic</span>
            </label>
        </div>
        
        <div class="setting">
            <label>Whitelist Keywords / Users</label>
            <textarea id="whitelist" placeholder="one per line e.g. @elonmusk or keyword"></textarea>
            <p class="hint">posts containing these wont get blurred</p>
        </div>

        <div class="setting platform-section">
            <label>Per-Platform Sensitivity</label>
            <div class="platform-row">
                <span>Twitter/X</span>
                <input type="range" id="pt_twitter" min="-5" max="0" step="0.1" value="-2.0">
                <span id="pt_twitter_val">-2.0</span>
            </div>
            <div class="platform-row">
                <span>Reddit</span>
                <input type="range" id="pt_reddit" min="-5" max="0" step="0.1" value="-2.5">
                <span id="pt_reddit_val">-2.5</span>
            </div>
            <div class="platform-row">
                <span>LinkedIn</span>
                <input type="range" id="pt_linkedin" min="-5" max="0" step="0.1" value="-1.5">
                <span id="pt_linkedin_val">-1.5</span>
            </div>
            <p class="hint">overrides the global threshold per site</p>
        </div>

        <button id="save">Save Settings</button>
        <div id="status"></div>
        
        <div class="stats-box">
            <div class="stats-title">posts filtered</div>
            <div class="stats-row">
                <span>total</span>
                <span id="stat-total">0</span>
            </div>
            <div class="stats-row">
                <span>anger</span>
                <span id="stat-anger">0</span>
            </div>
            <div class="stats-row">
                <span>toxic</span>
                <span id="stat-toxic">0</span>
            </div>
            <div class="stats-row">
                <span>sadness</span>
                <span id="stat-sadness">0</span>
            </div>
            <button id="clear-stats">clear stats</button>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
